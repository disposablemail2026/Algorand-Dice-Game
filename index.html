<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorand Dice Roll Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    button {
      background: #00d2ff;
      border: none;
      color: #000;
      padding: 12px 24px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }
    button:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
    .dice {
      font-size: 80px;
      margin: 20px 0;
    }
    .status {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #aaa;
      word-break: break-all;
    }
  </style>

  <!-- Load bundled Pera Wallet Connect -->
  <script type="module">
    import { PeraWalletConnect } from 'https://esm.sh/@perawallet/connect';

    // Initialize Pera Wallet Connect instance for TestNet (Chain ID: 416002)
    const peraWallet = new PeraWalletConnect({ chainId: 416002 });
    let userAddress = null;

    // Attach functions to the global window so buttons can trigger them
    window.connectWallet = async function() {
      const statusElement = document.getElementById('status');
      statusElement.innerText = "Opening Pera Wallet...";

      try {
        const accounts = await peraWallet.connect();
        
        // Listen for disconnect events
        peraWallet.connector?.on("disconnect", () => {
          userAddress = null;
          document.getElementById('connect-btn').innerText = "Connect Pera Wallet";
          document.getElementById('roll-btn').disabled = true;
          statusElement.innerText = "Wallet Disconnected";
        });

        if (accounts.length > 0) {
          userAddress = accounts[0];
          document.getElementById('connect-btn').innerText = `Connected: ${userAddress.substring(0, 6)}...`;
          document.getElementById('roll-btn').disabled = false;
          statusElement.innerText = "Ready to play on TestNet!";
        }
      } catch (error) {
        if (error?.data?.type === "CONNECT_MODAL_CLOSED") {
          statusElement.innerText = "Connection modal closed.";
        } else {
          console.error(error);
          statusElement.innerText = "Connection error. Please try again.";
        }
      }
    };

    window.playGame = function() {
      if (!userAddress) return;

      document.getElementById('status').innerText = "Rolling the dice...";
      document.getElementById('roll-btn').disabled = true;

      const rollResult = Math.floor(Math.random() * 6) + 1;
      const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
      
      document.getElementById('dice-display').innerText = diceEmojis[rollResult - 1];

      if (rollResult >= 4) {
        document.getElementById('status').innerText = `🎉 You rolled a ${rollResult}! YOU WIN!`;
      } else {
        document.getElementById('status').innerText = `❌ You rolled a ${rollResult}. Try again!`;
      }

      document.getElementById('roll-btn').disabled = false;
    };

    // Auto reconnect if you refreshed and already had an active session
    peraWallet.reconnectSession().then((accounts) => {
      if (accounts.length > 0) {
        userAddress = accounts[0];
        document.getElementById('connect-btn').innerText = `Connected: ${userAddress.substring(0, 6)}...`;
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('status').innerText = "Reconnected on TestNet!";
      }
    });
  </script>
</head>
<body>

  <div class="card">
    <h1>🎲 Algo Dice Roll</h1>
    <p>Predict if the roll will be <strong>4, 5, or 6</strong> to win!</p>

    <button id="connect-btn" onclick="connectWallet()">Connect Pera Wallet</button>

    <div class="dice" id="dice-display">🎲</div>

    <button id="roll-btn" onclick="playGame()" disabled>Bet 1 ALGO & Roll</button>

    <p class="status" id="status">Status: Wallet Disconnected</p>
  </div>

</body>
</html>
